<mat-card
  class="suggestion-card"
  [class.suggestion-card--local]="suggestion().inLocalLibrary"
  [class.suggestion-card--discovery]="!suggestion().inLocalLibrary"
  appearance="outlined">
  <mat-card-content class="card-content">
    <mat-icon class="track-icon" aria-hidden="true">music_note</mat-icon>
    <div class="track-details">
      <span class="track-title">{{ suggestion().title }}</span>
      <span class="track-artist">{{ suggestion().artist }}</span>
      @if (suggestion().album) {
        <span class="track-album">{{ suggestion().album }}</span>
      }
    </div>
    @if (!suggestion().inLocalLibrary) {
      <a
        [href]="youtubeUrl()"
        target="_blank"
        rel="noopener noreferrer"
        class="youtube-link"
        [attr.aria-label]="'Search ' + suggestion().artist + ' – ' + suggestion().title + ' on YouTube'"
        (click)="$event.stopPropagation()">
        <svg class="youtube-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5a3 3 0 0 0-2.1 2.1C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1c.5-1.9.5-5.8.5-5.8s0-3.9-.5-5.8z" fill="#FF0000"/>
          <polygon points="9.6,15.6 15.8,12 9.6,8.4" fill="#FFFFFF"/>
        </svg>
      </a>
    }
    @if (suggestion().inLocalLibrary) {
      <button
        mat-icon-button
        class="add-btn"
        (click)="addToClementine(); $event.stopPropagation()"
        [disabled]="addingToPlaylist()"
        [attr.aria-label]="'Add ' + suggestion().artist + ' – ' + suggestion().title + ' to Clementine playlist'">
        <mat-icon>queue_music</mat-icon>
      </button>
      <button
        mat-icon-button
        class="copy-btn"
        (click)="copyToClipboard(); $event.stopPropagation()"
        [attr.aria-label]="'Copy ' + suggestion().artist + ' – ' + suggestion().title + ' to clipboard'">
        <mat-icon>content_copy</mat-icon>
      </button>
    }
  </mat-card-content>
</mat-card>
