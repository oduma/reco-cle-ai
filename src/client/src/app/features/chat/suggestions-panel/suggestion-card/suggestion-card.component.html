<div
  class="tile"
  [class.tile--local]="suggestion().inLocalLibrary"
  [class.tile--discovery]="!suggestion().inLocalLibrary">

  <!-- Album art area (square) -->
  <div class="tile-art">
    @if (hasArt()) {
      <img
        class="art-img"
        [src]="suggestion().albumArtUrl!"
        [alt]="suggestion().album || suggestion().title"
        (error)="onArtError()" />
    } @else {
      <div class="art-placeholder">
        <mat-icon aria-hidden="true">album</mat-icon>
      </div>
    }

    <!-- Copy button overlaid bottom-left of art (local tracks only) -->
    @if (suggestion().inLocalLibrary) {
      <button
        mat-icon-button
        class="art-overlay-btn"
        (click)="copyToClipboard(); $event.stopPropagation()"
        [attr.aria-label]="'Copy ' + suggestion().artist + ' – ' + suggestion().title + ' to clipboard'">
        <mat-icon>content_copy</mat-icon>
      </button>
    }
  </div>

  <!-- Track info -->
  <div class="tile-info">
    <span class="tile-title">{{ suggestion().title }}</span>
    <span class="tile-artist">{{ suggestion().artist }}</span>
    @if (suggestion().album) {
      <span class="tile-album">{{ suggestion().album }}</span>
    }
  </div>

  <!-- Footer actions -->
  <div class="tile-footer">
    @if (!suggestion().inLocalLibrary) {
      <a
        [href]="youtubeUrl()"
        target="_blank"
        rel="noopener noreferrer"
        class="footer-action footer-action--link"
        [attr.aria-label]="'Search ' + suggestion().artist + ' – ' + suggestion().title + ' on YouTube'"
        (click)="$event.stopPropagation()">
        <img src="/icons/youtube.svg" class="footer-icon" alt="" aria-hidden="true" />
        <span>YouTube</span>
      </a>
    }
    @if (suggestion().inLocalLibrary) {
      <button
        mat-icon-button
        class="footer-action footer-action--btn"
        (click)="addToClementine(); $event.stopPropagation()"
        [disabled]="addingToPlaylist()"
        [attr.aria-label]="'Add ' + suggestion().artist + ' – ' + suggestion().title + ' to Clementine playlist'">
        <img src="/icons/clementine.svg" class="footer-icon" alt="" aria-hidden="true" />
      </button>
    }
  </div>

</div>
